<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <!-- LANÇAMENTO -->
  <div id="lancamento"></div>

  <!-- DESTAQUES -->
  <h2>🔥 Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<!-- IMPORTANTE: dados.js vem antes -->
<script src="dados.js"></script>

<script>
console.log("SCRIPT RODANDO");

// 🔥 TESTE: se isso aparecer, tá funcionando
if (!projetos) {
  document.body.innerHTML = "ERRO: projetos não carregou";
}

// ===== PEGAR ÚLTIMO =====
const ultimo = projetos[projetos.length - 1];

const lancamento = document.getElementById("lancamento");

// ===== CRIAR LANÇAMENTO =====
lancamento.innerHTML = `
  <div style="background:#000;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px;">
    <h1>${ultimo.nome}</h1>
    <p id="contador">Carregando...</p>
    <a id="botao" style="background:white;color:black;padding:10px 15px;border-radius:8px;text-decoration:none;">...</a>
  </div>
`;

const contador = document.getElementById("contador");
const botao = document.getElementById("botao");

// ===== CONTADOR =====
if (ultimo.data) {

  const data = new Date(ultimo.data).getTime();

  setInterval(() => {
    const agora = new Date().getTime();
    const dif = data - agora;

    if (dif <= 0) {
      contador.innerHTML = "🎵 Já disponível";
      botao.innerText = "▶ Ouvir agora";
      botao.href = ultimo.ouvir;
      return;
    }

    const d = Math.floor(dif / (1000*60*60*24));
    const h = Math.floor((dif / (1000*60*60)) % 24);
    const m = Math.floor((dif / (1000*60)) % 60);

    contador.innerHTML = `⏳ ${d}d ${h}h ${m}m`;

    botao.innerText = "🔔 Pré-save";
    botao.href = ultimo.preSave || "#";

  }, 1000);

} else {
  contador.innerHTML = "Sem data definida";
}

// ===== DESTAQUES =====
const top = document.getElementById("top");

top.innerHTML = "";

const recentes = [...projetos].reverse().slice(0,3);

recentes.forEach((p,i) => {
  top.innerHTML += `
    <div class="card">
      <img src="${p.capa}">
      <p>${p.tipo}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

</script>

</body>
</html>
