<div class="container">
  <h1>Destaques</h1>
  <div class="grid" id="destaques"></div>
</div>

<!-- DADOS -->
<script src="dados.js"></script>

<!-- SCRIPT -->
<script>
const container = document.getElementById("destaques");

const destaques = window.projetos
  .filter(p => p.destaque)
  .slice(0, 4);

function formatarTempo(ms) {
  const total = Math.floor(ms / 1000);
  const dias = Math.floor(total / 86400);
  const horas = Math.floor((total % 86400) / 3600);
  const min = Math.floor((total % 3600) / 60);

  return `${dias}d ${horas}h ${min}m`;
}

function render() {
  container.innerHTML = "";

  destaques.forEach(p => {
    const agora = new Date();
    const lancamento = p.data ? new Date(p.data) : null;

    let extra = "";
    let acao = `window.open('${p.ouvir}', '_blank')`;

    // 🔥 SE AINDA NÃO LANÇOU
    if (lancamento && agora < lancamento) {
      const diff = lancamento - agora;

      extra = `
        <p style="color:#aaa;">⏳ ${formatarTempo(diff)}</p>
        <button onclick="event.stopPropagation(); window.open('${p.preSave}', '_blank')">
          Pré-Save
        </button>
      `;

      acao = ""; // bloqueia clique
    }

    container.innerHTML += `
      <div class="card" onclick="${acao}">
        <img src="${p.capa}">
        <p>${p.tipo}</p>
        <h3>${p.nome}</h3>
        ${extra}
      </div>
    `;
  });
}

// atualiza a cada segundo
setInterval(render, 1000);
render();
</script>
