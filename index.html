<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lançamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  left: 0;
  padding: 15px;
}

.menu a {
  background: #1db954;
  color: white;
  padding: 10px 15px;
  text-decoration: none;
  border-radius: 8px;
}

/* CONTAINER */
.container {
  padding: 80px 20px;
  text-align: center;
}

/* GRID DE LANÇAMENTOS */
.lancamentos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

/* CARD */
.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 12px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

/* IMAGEM */
.card img {
  width: 100%;
  border-radius: 10px;
}

/* NOME */
.card p {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- BOTÃO PRODUTOS -->
<div class="menu">
  <a href="produtos.html">🛒 Produtos</a>
</div>

<div class="container">

  <h1>🔥 Lançamentos</h1>

  <div class="lancamentos">

    <!-- LANÇAMENTO 1 -->
    <div class="card" onclick="abrir('musica1.html')">
      <img src="capa1.jpg">
      <p>Nome da Música 1</p>
    </div>

    <!-- LANÇAMENTO 2 -->
    <div class="card" onclick="abrir('musica2.html')">
      <img src="capa2.jpg">
      <p>Nome da Música 2</p>
    </div>

    <!-- LANÇAMENTO 3 -->
    <div class="card" onclick="abrir('musica3.html')">
      <img src="capa3.jpg">
      <p>Nome da Música 3</p>
    </div>

  </div>

</div>

<script>
function abrir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
