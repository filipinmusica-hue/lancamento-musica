<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filipe Música</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <div class="banner">
    <img id="bg" src="">
    <div class="overlay">
      <h1 id="titulo">Carregando...</h1>
      <p id="contador"></p>
      <a id="botao" class="btn" href="#">Pré-save</a>
    </div>
  </div>

  <h2>Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>

<script>

// filtra os destaques

const top = document.getElementById("top");

// filtra os destaques
const destaques = window.projetos.filter(p => p.destaque);

// monta na tela
destaques.forEach((p) => {
  top.innerHTML += `
  <a href="${p.ouvir}" target="_blank" class="card">
    <img src="${p.capa}">
    <p>${p.tipo}</p>
    <h3>${p.nome}</h3>
  </a>
`;})
</script>

<script>
window.onload = function () {
  const projetos = window.projetos;

  const titulo = document.getElementById("titulo");
  const contador = document.getElementById("contador");
  const bg = document.getElementById("bg");
  const botao = document.getElementById("botao");
  const top = document.getElementById("top");

  if (!projetos || projetos.length === 0) {
    titulo.innerText = "Erro nos dados";
    contador.innerText = "O dados.js não carregou corretamente";
    return;
  }

  const lancamento = projetos[projetos.length - 1];

  titulo.innerText = lancamento.nome;
  bg.src = lancamento.capa;
  botao.href = lancamento.preSave || "#";

  function atualizarContador() {
    const agora = new Date().getTime();
    const data = new Date(lancamento.data).getTime();
    const diferenca = data - agora;

    if (diferenca <= 0) {
      contador.innerText = "Já disponível";
      botao.innerText = "Ouvir agora";
      botao.href = lancamento.ouvir || "#";
      bg.style.filter = "blur(0px)";
      return;
    }

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);

    contador.innerText = `${dias}d ${horas}h ${minutos}m`;
    botao.innerText = "Pré-save";
  }

  atualizarContador();
  setInterval(atualizarContador, 1000);

  const destaques = projetos.slice(0, -1).reverse().slice(0, 3);

  destaques.forEach((p, index) => {
    top.innerHTML += `
      <div class="card">
        <img src="${p.capa}">
        <p>${p.tipo.toUpperCase()}</p>
        <h3>${p.nome}</h3>
      </div>
    `;
  });
};
</script>
