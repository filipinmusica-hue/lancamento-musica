<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Música</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
    }

    button {
      background: #1db954;
      border: none;
      padding: 15px;
      color: white;
      font-size: 18px;
      border-radius: 8px;
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔥 Minha Música</h1>

  <img src="capa.jpg">

  <audio controls>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button onclick="comprar()">Comprar agora</button>

</div>

<script>
  function comprar() {
    window.location.href = "https://SEU-LINK-AQUI.com";
  }
</script>

</body>
</html>
