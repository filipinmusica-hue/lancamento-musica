<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lançamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
  color: #111;
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 15px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
}

.menu-esquerda {
  display: flex;
  gap: 10px;
}

.menu a {
  background: #000;
  color: white;
  padding: 8px 12px;
  text-decoration: none;
  border-radius: 8px;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 90px 20px;
}

/* BANNER */
.banner {
  position: relative;
  width: 100%;
  max-width: 600px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
}

#bg {
  width: 100%;
  filter: blur(20px);
  transition: 1s;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.4);
  color: white;
  text-align: center;
  transition: 1s;
}

/* 🎵 NOME DA MÚSICA (FADE IN) */
.titulo {
  font-size: 28px;
  opacity: 0;
  transform: translateY(20px);
  animation: aparecer 2s ease forwards;
}

/* ⏱️ CONTADOR ANIMADO */
#contador {
  font-size: 22px;
  margin-top: 10px;
  animation: pulse 1s infinite alternate;
}

/* BOTÃO */
.btn {
  margin-top: 15px;
  padding: 12px 20px;
  background: #000;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}

/* LANÇAMENTOS */
.lancamentos {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* ANIMAÇÕES */
@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  from { opacity: 0.6; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <div class="menu-esquerda">
    <a href="index.html">🎵 Lançamentos</a>
    <a href="produtos.html">🛒 Produtos</a>
  </div>
</div>

<div class="container">

  <!-- 🔥 BANNER -->
  <div class="banner">
    <img src="capa1.jpg" id="bg">

    <div class="overlay" id="overlay">

      <!-- 🎵 NOME -->
      <h2 class="titulo">Nome da Música</h2>

      <!-- ⏱️ CONTADOR -->
      <p id="contador">Carregando...</p>

      <!-- 🔘 BOTÃO -->
      <a id="botao" class="btn" href="#" target="_blank">
        🔔 Pré-save
      </a>

    </div>
  </div>

  <!-- 🎵 LANÇAMENTOS -->
  <div class="lancamentos">
    <h2>Outros lançamentos</h2>

    <div class="grid">
      <div class="card" onclick="abrir('musica2.html')">
        <img src="capa2.jpg">
        <p>Música 2</p>
      </div>

      <div class="card" onclick="abrir('musica3.html')">
        <img src="capa3.jpg">
        <p>Música 3</p>
      </div>

      <div class="card" onclick="abrir('musica4.html')">
        <img src="capa4.jpg">
        <p>Música 4</p>
      </div>
    </div>
  </div>

</div>

<script>
// DATA DO LANÇAMENTO
const dataLancamento = new Date("2026-05-01T00:00:00").getTime();

const contador = document.getElementById("contador");
const bg = document.getElementById("bg");
const botao = document.getElementById("botao");
const overlay = document.getElementById("overlay");

// LINKS
const preSaveLink = "https://SEU-PRESAVE.com";
const ouvirLink = "https://spotify.com";

botao.href = preSaveLink;

const intervalo = setInterval(() => {
  const agora = new Date().getTime();
  const diferenca = dataLancamento - agora;

  if (diferenca <= 0) {
    clearInterval(intervalo);

    contador.innerHTML = "🎵 Já disponível!";
    bg.style.filter = "blur(0px)";

    // 🌫️ FADE OUT OVERLAY
    overlay.style.background = "rgba(0,0,0,0)";
    overlay.style.color = "#000";

    // 🔄 BOTÃO
    botao.innerHTML = "▶ Ouça agora";
    botao.href = ouvirLink;

    return;
  }

  const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diferenca / (1000 * 60)) % 60);

  contador.innerHTML = `${dias}d ${horas}h ${minutos}m`;

  // BLUR DIMINUINDO
  const diasAntes = 7 * 24 * 60 * 60 * 1000;
  const progresso = 1 - (diferenca / diasAntes);
  const blur = Math.max(0, 20 - progresso * 20);

  bg.style.filter = `blur(${blur}px)`;

}, 1000);

// navegação
function abrir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
