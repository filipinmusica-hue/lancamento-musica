<!DOCTYPE html>

<div class="container">
  <h1>Destaques</h1>

  <!-- 🔥 GRID DOS DESTAQUES -->
  <div class="grid" id="destaques"></div>
</div>

<!-- IMPORTANTE: dados primeiro -->
<script src="dados.js"></script>

<!-- SCRIPT DOS DESTAQUES -->
<script>
const container = document.getElementById("destaques");

const destaques = window.projetos
  .filter(p => p.destaque)
  .slice(0, 4);

destaques.forEach(p => {
  container.innerHTML += `
    <div class="card" onclick="window.open('${p.ouvir}', '_blank')">
      <img src="${p.capa}">
      <p>${p.tipo}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});
</script>

<footer style="background:linear-gradient(180deg,#050505,#111); color:#fff; display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid #333; margin-top:80px; box-shadow:0 -10px 30px rgba(0,0,0,.4);">

  <div style="padding:35px; text-align:center;">
    <img src="logo.png" style="width:110px;">
  </div>

  <div style="padding:35px; text-align:center;">
    <a href="mailto:seuemail@email.com">Suporte</a><br>

  </div>

  <div style="padding:35px; text-align:center;">

    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://open.spotify.com/intl-pt/artist/0wgTRO4zWneUTAr9M4gNJS" target="_blank">Spotify</a>
  </div>

</footer>

</body>
</html>
