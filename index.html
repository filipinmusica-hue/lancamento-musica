<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lançamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: rgba(0,0,0,0.7);
}

.menu a {
  background: #1db954;
  color: white;
  padding: 8px 12px;
  text-decoration: none;
  border-radius: 8px;
}

/* CONTAINER */
.container {
  padding: 90px 20px;
}

/* BLOCO PRINCIPAL */
.topo {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

/* IMAGEM PRINCIPAL */
.topo img {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
}

/* TEXTO AO LADO / ABAIXO */
.info {
  max-width: 300px;
}

.info h2 {
  margin: 0;
}

.info p {
  color: #ccc;
  margin-top: 10px;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background: #1db954;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* LANÇAMENTOS */
.lancamentos {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card p {
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#">🎵 Meu Site</a>
  <a href="produtos.html">🛒 Produtos</a>
</div>

<div class="container">

  <!-- 🔥 BLOCO PRINCIPAL -->
  <div class="topo">

    <!-- IMAGEM -->
    <img src="capa1.jpg">

    <!-- TEXTO AO LADO (ou embaixo no celular) -->
    <div class="info">
      <h2>🔥 Nome da Música</h2>
      <p>Seu último lançamento. Escute agora nas plataformas.</p>

      <a class="btn" href="musica1.html">
        Ouvir agora
      </a>
    </div>

  </div>

  <!-- 🎵 LANÇAMENTOS -->
  <div class="lancamentos">
    <h2>Outros lançamentos</h2>

    <div class="grid">

      <div class="card" onclick="abrir('musica2.html')">
        <img src="capa2.jpg">
        <p>Música 2</p>
      </div>

      <div class="card" onclick="abrir('musica3.html')">
        <img src="capa3.jpg">
        <p>Música 3</p>
      </div>

      <div class="card" onclick="abrir('musica4.html')">
        <img src="capa4.jpg">
        <p>Música 4</p>
      </div>

    </div>
  </div>

</div>

<script>
function abrir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
