<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lançamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff; /* fundo branco */
  color: #111; /* texto escuro */
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 15px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
}

.menu-esquerda {
  display: flex;
  gap: 10px;
}

.menu a {
  background: #000000; /* botão preto */
  color: white;
  padding: 8px 12px;
  text-decoration: none;
  border-radius: 8px;
}

.menu a:hover {
  background: #333;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 90px 20px;
}

/* TOPO */
.topo {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 30px;
}

.topo img.capa {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
}

/* INFO */
.info {
  max-width: 300px;
  text-align: left;
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 10px;
}

/* TEXTO */
.info p {
  color: #555;
}

/* BOTÃO PRINCIPAL */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background: #000000;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

.btn:hover {
  background: #333;
}

/* LANÇAMENTOS */
.lancamentos {
  margin-top: 50px;
}

.lancamentos h2 {
  text-align: left;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card p {
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <div class="menu-esquerda">
    <a href="index.html">🎵 Lançamentos</a>
    <a href="produtos.html">🛒 Produtos</a>
  </div>
</div>

<div class="container">

  <!-- DESTAQUE -->
  <div class="topo">

    <img src="capa1.jpg" class="capa">

    <div class="info">

      <img src="logo.png" class="logo">

      <h2>🔥 Nome da Música</h2>
      <p>Seu último lançamento. Escute agora nas plataformas.</p>

      <a class="btn" href="musica1.html">
        Ouvir agora
      </a>

    </div>

  </div>

  <!-- LANÇAMENTOS -->
  <div class="lancamentos">
    <h2>Outros lançamentos</h2>

    <div class="grid">

      <div class="card" onclick="abrir('musica2.html')">
        <img src="capa2.jpg">
        <p>Música 2</p>
      </div>

      <div class="card" onclick="abrir('musica3.html')">
        <img src="capa3.jpg">
        <p>Música 3</p>
      </div>

      <div class="card" onclick="abrir('musica4.html')">
        <img src="capa4.jpg">
        <p>Música 4</p>
      </div>

    </div>
  </div>

</div>

<script>
function abrir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
