<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filipe Música</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <!-- 🔥 LANÇAMENTO -->
  <div class="banner">
    <img id="bg">
    <div class="overlay">
      <h1 id="titulo"></h1>
      <p id="contador"></p>
      <a id="botao" class="btn">Pré-save</a>
    </div>
  </div>

  <!-- 🔥 DESTAQUES -->
  <h2>🔥 Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>

<script>

// 🔴 TESTE
if (!window.projetos) {
  document.body.innerHTML = "ERRO: dados.js não carregou";
}

// 🔥 LANÇAMENTO
const lancamento = window.projetos[window.projetos.length - 1];

// ELEMENTOS
const bg = document.getElementById("bg");
const titulo = document.getElementById("titulo");
const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const top = document.getElementById("top");

// SETAR
bg.src = lancamento.capa;
titulo.innerText = lancamento.nome;

// ⏳ CONTADOR
function atualizar() {

  if (!lancamento.data) {
    contador.innerText = "Sem data";
    return;
  }

  const agora = new Date().getTime();
  const data = new Date(lancamento.data).getTime();
  const dif = data - agora;

  if (dif <= 0) {
    contador.innerText = "🎵 Já disponível";
    botao.innerText = "▶ Ouvir agora";
    botao.href = lancamento.ouvir;
    bg.style.filter = "blur(0)";
    return;
  }

  const d = Math.floor(dif / (1000*60*60*24));
  const h = Math.floor((dif / (1000*60*60)) % 24);
  const m = Math.floor((dif / (1000*60)) % 60);

  contador.innerText = `⏳ ${d}d ${h}h ${m}m`;
  botao.innerText = "🔔 Pré-save";
  botao.href = lancamento.preSave || "#";
}

setInterval(atualizar, 1000);
atualizar();


// 🔥 DESTAQUES
const destaques = window.projetos.slice(0, -1).reverse().slice(0, 3);

destaques.forEach((p) => {
  top.innerHTML += `
    <div class="card">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

</script>

</body>
</html>
