<html lang="pt-br">
<head>
<meta charset="UTF-8">

</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<!-- 🔥 NOVO LANÇAMENTO -->
<div class="container">
  <h1>Novo Lançamento</h1>
  <div id="novoLancamento"></div>
</div>

<!-- 🔥 DESTAQUES -->
<div class="container">
  <h1>Destaques</h1>
  <div class="grid" id="destaques"></div>
</div>

<script src="dados.js"></script>

<script>
const destaquesContainer = document.getElementById("destaques");
const novoContainer = document.getElementById("novoLancamento");

function formatarTempo(ms) {
  const total = Math.floor(ms / 1000);
  const dias = Math.floor(total / 86400);
  const horas = Math.floor((total % 86400) / 3600);
  const min = Math.floor((total % 3600) / 60);
  return `${dias}d ${horas}h ${min}m`;
}

function render() {
  destaquesContainer.innerHTML = "";
  novoContainer.innerHTML = "";

  // 🎧 DESTAQUES
  const destaques = window.projetos
    .filter(p => p.destaque === true)
    .slice(0, 4);

  destaques.forEach(p => {
    destaquesContainer.innerHTML += `
      <div class="card" onclick="window.open('${p.ouvir}', '_blank')">
        <img src="${p.capa}">
        <p>${p.tipo}</p>
        <h3>${p.nome}</h3>
      </div>
    `;
  });

  // 🔥 NOVO LANÇAMENTO
  const novo = window.projetos.find(p => p.data);

  if (novo) {
    const agora = new Date();
    const lancamento = new Date(novo.data.replace(" ", "T"));

    let extra = "";
    let bloquear = false;

    if (agora < lancamento) {
      const diff = lancamento - agora;
      bloquear = true;

      extra = `
        <p>⏳ ${formatarTempo(diff)}</p>
        <button onclick="event.stopPropagation(); window.open('${novo.preSave}', '_blank')">
          Pré-Save
        </button>
      `;
    }

    novoContainer.innerHTML = `
      <div class="lancamento-card" onclick="${bloquear ? "" : `window.open('${novo.ouvir}', '_blank')`}">
        <img src="${novo.capa}">
        <div class="lancamento-info">
          <p>${novo.tipo}</p>
          <h2>${novo.nome}</h2>
          ${extra}
        </div>
      </div>
    `;
  }
}

render();
setInterval(render, 1000);
</script>
