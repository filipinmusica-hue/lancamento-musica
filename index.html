<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filipe Música</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <div id="lancamento"></div>

  <h2>🔥 Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>
<script>

// PEGAR ÚLTIMO (lançamento)
const ultimo = projetos[projetos.length - 1];

// CRIAR BANNER
document.getElementById("lancamento").innerHTML = `
  <div class="banner">
    <img id="bg" src="${ultimo.capa}">
    <div class="overlay">
      <h1>${ultimo.nome}</h1>
      <p id="contador">Carregando...</p>
      <a id="botao" class="btn" href="#">Pré-save</a>
    </div>
  </div>
`;

const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const bg = document.getElementById("bg");

// CONTADOR
if (ultimo.data) {
  const data = new Date(ultimo.data).getTime();

  setInterval(() => {
    const agora = new Date().getTime();
    const dif = data - agora;

    if (dif <= 0) {
      contador.innerHTML = "🎵 Já disponível";
      botao.innerText = "▶ Ouvir agora";
      botao.href = ultimo.ouvir;
      bg.style.filter = "blur(0)";
      return;
    }

    const d = Math.floor(dif / (1000*60*60*24));
    const h = Math.floor((dif / (1000*60*60)) % 24);
    const m = Math.floor((dif / (1000*60)) % 60);

    contador.innerHTML = `⏳ ${d}d ${h}h ${m}m`;
    botao.innerText = "🔔 Pré-save";
    botao.href = ultimo.preSave;
  }, 1000);
}

// DESTAQUES (SEM o lançamento)
const top = document.getElementById("top");

const destaques = projetos.slice(0, -1).reverse().slice(0, 3);

destaques.forEach((p, index) => {
  const realIndex = projetos.length - 2 - index;

  top.innerHTML += `
    <div class="card" onclick="abrirProjeto(${realIndex})">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(index){
  localStorage.setItem("projeto", index);
  window.location.href = "album.html";
}

</script>

</body>
</html>
