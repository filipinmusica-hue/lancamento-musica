<!-- 🔥 DESTAQUES -->
<div class="container">
  <h1>Destaques</h1>
  <div class="grid" id="destaques"></div>
</div>

<script src="dados.js"></script>

<script>
const destaquesContainer = document.getElementById("destaques");
const novoContainer = document.getElementById("novoLancamento");

function formatarTempo(ms) {
  const total = Math.floor(ms / 1000);
  const dias = Math.floor(total / 86400);
  const horas = Math.floor((total % 86400) / 3600);
  const min = Math.floor((total % 3600) / 60);
  return `${dias}d ${horas}h ${min}m`;
}

function criarCard(p, extra = "", bloquear = false) {
  const acao = bloquear ? "" : `window.open('${p.ouvir}', '_blank')`;

  return `
    <div class="card" onclick="${acao}">
      <img src="${p.capa}">
      <p>${p.tipo}</p>
      <h3>${p.nome}</h3>
      ${extra}
    </div>
  `;
}

function render() {
  destaquesContainer.innerHTML = "";
  novoContainer.innerHTML = "";

  // 🔥 DESTAQUES (4)
  const destaques = window.projetos
    .filter(p => p.destaque === true)
    .slice(0, 4);

  destaques.forEach(p => {
    destaquesContainer.innerHTML += criarCard(p);
  });

  // 🔥 NOVO LANÇAMENTO
  const novo = window.projetos.find(p => p.data);

  if (novo) {
    const agora = new Date();
    const lancamento = new Date(novo.data.replace(" ", "T"));

    let extra = "";
    let bloquear = false;

    if (agora < lancamento) {
      const diff = lancamento - agora;
      bloquear = true;

      extra = `
        <p style="color:#aaa; margin:8px 0;">⏳ ${formatarTempo(diff)}</p>
        <button onclick="event.stopPropagation(); window.open('${novo.preSave}', '_blank')">
          Pré-Save
        </button>
      `;
    }

    novoContainer.innerHTML = criarCard(novo, extra, bloquear);
  }
}

render();
setInterval(render, 1000);
</script>
