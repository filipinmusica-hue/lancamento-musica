<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

<div id="lancamento"></div>

<h2>🔥 Destaques</h2>
<div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>
<script>

if (typeof projetos === "undefined") {
  document.body.innerHTML = "<h1>Erro no dados.js</h1>";
}

// PEGAR ÚLTIMO
const ultimo = projetos[projetos.length - 1];

// LANÇAMENTO
document.getElementById("lancamento").innerHTML = `
  <div class="banner">
    <img id="bg" src="${ultimo.capa}">
    <div class="overlay">
      <h1>${ultimo.nome}</h1>
      <p id="contador"></p>
      <a id="botao" class="btn"></a>
    </div>
  </div>
`;

const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const bg = document.getElementById("bg");

// CONTADOR
if (ultimo.data) {

  const data = new Date(ultimo.data).getTime();

  setInterval(() => {
    const agora = new Date().getTime();
    const dif = data - agora;

    if (dif <= 0) {
      contador.innerHTML = "🎵 Já disponível";
      botao.innerText = "▶ Ouvir agora";
      botao.href = ultimo.ouvir;
      bg.style.filter = "blur(0)";
      return;
    }

    const d = Math.floor(dif / (1000*60*60*24));
    const h = Math.floor((dif / (1000*60*60)) % 24);
    const m = Math.floor((dif / (1000*60)) % 60);

    contador.innerHTML = `⏳ ${d}d ${h}h ${m}m`;

    botao.innerText = "🔔 Pré-save";
    botao.href = ultimo.preSave || "#";

  }, 1000);

}

// DESTAQUES
const top = document.getElementById("top");
top.innerHTML = "";

const recentes = [...projetos].reverse().slice(0,3);

recentes.forEach((p,i) => {
  top.innerHTML += `
    <div class="card" onclick="abrirProjeto(${projetos.length - 1 - i})">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(i){
  localStorage.setItem("projeto", i);
  window.location.href = "album.html";
}

</script>

</body>
</html>
