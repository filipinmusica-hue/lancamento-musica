<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

<!-- 🔥 NOVO LANÇAMENTO -->
<div id="lancamento"></div>

<!-- ⭐ DESTAQUES -->
<h2>🔥 Destaques</h2>
<div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>
<script>

const lancamentoDiv = document.getElementById("lancamento");
const top = document.getElementById("top");

// último projeto = lançamento
const ultimo = projetos[projetos.length - 1];

// ===== LANÇAMENTO =====
lancamentoDiv.innerHTML = `
  <div class="banner">
    <img src="${ultimo.capa}">
    <div class="overlay">
      <h1>${ultimo.nome}</h1>
      <p>${ultimo.tipo.toUpperCase()}</p>
      <a href="#" onclick="abrirProjeto(${projetos.length - 1})" class="btn">
        ▶ Ver lançamento
      </a>
    </div>
  </div>
`;

// ===== DESTAQUES =====
const recentes = [...projetos].reverse().slice(0,3);

recentes.forEach((p,i) => {
  top.innerHTML += `
    <div class="card" onclick="abrirProjeto(${projetos.length - 1 - i})">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(i){
  localStorage.setItem("projeto", i);
  window.location.href = "album.html";
}

</script>

</body>
</html>
