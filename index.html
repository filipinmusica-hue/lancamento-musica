<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filipe Música</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <!-- BANNER -->
  <div class="banner">
    <img id="bg" src="">
    <div class="overlay">
      <h1 id="titulo">Carregando...</h1>
      <p id="contador"></p>
      <a id="botao" class="btn">Pré-save</a>
    </div>
  </div>

  <!-- DESTAQUES -->
  <h2>🔥 Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<!-- IMPORTANTE: dados.js primeiro -->
<script src="dados.js"></script>

<script>
const projetos = window.projetos;
const lancamento = projetos[projetos.length - 1];

const bg = document.getElementById("bg");
const titulo = document.getElementById("titulo");
const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const top = document.getElementById("top");

// BANNER
bg.src = lancamento.capa;
titulo.innerText = lancamento.nome;

function atualizar() {
  const agora = new Date().getTime();
  const data = new Date(lancamento.data).getTime();
  const diff = data - agora;

  if (diff <= 0) {
    contador.innerText = "🎵 Já disponível";
    botao.innerText = "▶ Ouvir agora";
    botao.href = lancamento.ouvir;
    bg.style.filter = "blur(0px)";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);

  contador.innerText = `⏳ ${d}d ${h}h ${m}m`;
  botao.innerText = "🔔 Pré-save";
  botao.href = lancamento.preSave;
}

setInterval(atualizar, 1000);
atualizar();

// DESTAQUES (sem o lançamento)
const destaques = projetos.slice(0, -1).reverse().slice(0, 3);

destaques.forEach((p, i) => {
  top.innerHTML += `
    <div class="card" onclick="abrirProjeto(${i})">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

// ABRIR PROJETO
function abrirProjeto(index) {
  localStorage.setItem("projeto", index);
  window.location.href = "album.html";
}
</script>

</body>
</html>
