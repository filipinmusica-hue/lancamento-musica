<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filipe Música</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">

  <div class="banner">
    <img id="bg" src="" alt="Capa do novo lançamento">
    <div class="overlay">
      <h1 id="titulo">Carregando...</h1>
      <p id="contador"></p>
      <a id="botao" class="btn" href="#">Pré-save</a>
    </div>
  </div>

  <h2>🔥 Destaques</h2>
  <div class="grid" id="top"></div>

</div>

<script src="dados.js"></script>
<script>
if (!window.projetos || window.projetos.length === 0) {
  document.body.innerHTML = "<h1>Erro: dados.js não carregou corretamente.</h1>";
}

const projetos = window.projetos;
const lancamento = projetos[projetos.length - 1];

const bg = document.getElementById("bg");
const titulo = document.getElementById("titulo");
const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const top = document.getElementById("top");

bg.src = lancamento.capa;
titulo.innerText = lancamento.nome;
botao.href = lancamento.preSave || "#";

function atualizarContador() {
  if (!lancamento.data) {
    contador.innerText = "Data não definida";
    return;
  }

  const agora = new Date().getTime();
  const dataLancamento = new Date(lancamento.data).getTime();
  const diferenca = dataLancamento - agora;

  if (diferenca <= 0) {
    contador.innerText = "🎵 Já disponível";
    botao.innerText = "▶ Ouvir agora";
    botao.href = lancamento.ouvir || "#";
    bg.style.filter = "blur(0px)";
    return;
  }

  const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diferenca / (1000 * 60)) % 60);

  contador.innerText = `⏳ ${dias}d ${horas}h ${minutos}m`;
  botao.innerText = "🔔 Pré-save";
  botao.href = lancamento.preSave || "#";
  bg.style.filter = "blur(20px)";
}

atualizarContador();
setInterval(atualizarContador, 1000);

const destaques = projetos.slice(0, -1).reverse().slice(0, 3);

destaques.forEach((p, index) => {
  const realIndex = projetos.length - 2 - index;

  top.innerHTML += `
    <div class="card" onclick="abrirProjeto(${realIndex})">
      <img src="${p.capa}" alt="${p.nome}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(index) {
  localStorage.setItem("projeto", index);
  window.location.href = "album.html";
}
</script>

</body>
</html>
