<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">
  <h1>🎧 Catálogo</h1>
  <div class="grid" id="catalogo"></div>
</div>

<script src="dados.js"></script>
<script>
const catalogo = document.getElementById("catalogo");

projetos.forEach((p, index) => {
  catalogo.innerHTML += `
    <div class="card" onclick="abrirProjeto(${index})">
      <img src="${p.capa}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(index) {
  localStorage.setItem("projeto", index);
  window.location.href = "album.html";
}
</script>

</body>
</html>
