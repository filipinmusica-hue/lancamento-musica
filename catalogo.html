<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">
  <h1> Catálogo</h1>
  <div class="grid" id="catalogo"></div>
</div>

<script src="dados.js"></script>
<script>
const catalogo = document.getElementById("catalogo");

window.projetos.forEach((p, index) => {
  catalogo.innerHTML += `
    <div class="card" onclick="abrirProjeto(${index})">
      <img src="${p.capa}" alt="${p.nome}">
      <p>${p.tipo.toUpperCase()}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});

function abrirProjeto(index) {
  localStorage.setItem("projeto", index);
  window.location.href = "album.html";
}
</script>
<footer class="footer">
  <div class="footer-col">
    <img src="logo.png" class="logo-footer">
  </div>

  <div class="footer-col">
    <a href="mailto:seuemail@email.com">Suporte</a>
    <a href="mailto:seuemail@email.com">Contato</a>
    <a href="sobre.html">Sobre o artista</a>
  </div>

  <div class="footer-col">
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://tiktok.com" target="_blank">TikTok</a>
    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://spotify.com" target="_blank">Spotify</a>
  </div>
</footer>
</body>
</html>
