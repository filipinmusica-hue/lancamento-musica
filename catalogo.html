<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container">
  <h1> Catálogo</h1>
  <div class="grid" id="catalogo"></div>
</div>

<script src="dados.js"></script>

<script>
const catalogo = document.getElementById("catalogo");

<script src="dados.js"></script>

<script>
const catalogo = document.getElementById("catalogo");

window.projetos.forEach((p) => {
  catalogo.innerHTML += `
    <div class="card" onclick="window.open('${p.ouvir}', '_blank')">
      <img src="${p.capa}">
      <p>${p.tipo}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});
</script>

  
<footer style="background:linear-gradient(180deg,#050505,#111); color:#fff; display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid #333; margin-top:80px; box-shadow:0 -10px 30px rgba(0,0,0,.4);">

  <div style="padding:35px 25px; text-align:center; border-right:1px solid rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center;">
    <img src="logo.png" style="width:110px; max-height:110px; object-fit:contain; filter:drop-shadow(0 0 12px rgba(255,255,255,.15));">
  </div>

  <div style="padding:35px 25px; text-align:center; border-right:1px solid rgba(255,255,255,.18); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;">
    <a href="mailto:seuemail@email.com?subject=Suporte" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">Suporte</a>
    <a href="mailto:seuemail@email.com?subject=Contato" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">Contato</a>
    <a href="sobre.html" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">Sobre o artista</a>
  </div>

  <div style="padding:35px 25px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;">
    <a href="https://instagram.com" target="_blank" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">Instagram</a>
    <a href="https://tiktok.com" target="_blank" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">TikTok</a>
    <a href="https://youtube.com" target="_blank" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">YouTube</a>
    <a href="https://spotify.com" target="_blank" style="color:white; text-decoration:none; background:#181818; padding:10px 18px; border-radius:12px; width:170px;">Spotify</a>
  </div>

</footer>
</body>
</html>
