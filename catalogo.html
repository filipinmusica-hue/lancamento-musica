<!DOCTYPE html>

<div class="container">
  <h1> Catálogo</h1>
  <div class="grid" id="catalogo"></div>
</div>

<script src="dados.js"></script>

<script>
const catalogo = document.getElementById("catalogo");

<script src="dados.js"></script>

<script>
const catalogo = document.getElementById("catalogo");

window.projetos.forEach((p) => {
  catalogo.innerHTML += `
    <div class="card" onclick="window.open('${p.ouvir}', '_blank')">
      <img src="${p.capa}">
      <p>${p.tipo}</p>
      <h3>${p.nome}</h3>
    </div>
  `;
});
</script>

<footer style="background:linear-gradient(180deg,#050505,#111); color:#fff; display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid #333; margin-top:80px;">
