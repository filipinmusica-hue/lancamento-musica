<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Projeto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="catalogo.html">Músicas</a>
  <a href="produtos.html">Produtos</a>
</div>

<div class="container" id="pagina"></div>

<script src="dados.js"></script>
<script>
const index = localStorage.getItem("projeto") || 0;
const projeto = window.projetos[index];

document.getElementById("pagina").innerHTML = `
  <div class="album-header">
    <img src="${projeto.capa}" alt="${projeto.nome}">
    <h1>${projeto.nome}</h1>
    <p>${projeto.tipo.toUpperCase()}</p>
    <a href="${projeto.ouvir}" target="_blank" class="btn">▶ Ouvir agora</a>
  </div>

  <h2>🎵 Músicas</h2>

  <div class="lista-musicas">
    ${projeto.musicas.map(m => `
      <div class="musica-item">${m.nome}</div>
    `).join("")}
  </div>
`;
</script>

</body>
</html>
